<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalX Knowledge Centre</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand fw-bold">
            ⚖️ LegalX Knowledge Centre
        </span>
    </div>
</nav>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="main-heading">
            Indian Legal Knowledge Hub
        </h1>

        <p class="subtitle">
            Explore important laws, rights, provisions and penalties through
            AI-powered summaries and explanations.
        </p>
    </div>

    <div class="row g-4">

        {% for topic in topics %}

        <div class="col-md-6 col-lg-4">

            <div class="card law-card h-100">

                <div class="card-body">

                    <h4 class="card-title">
                        {{ topic.name.replace("_"," ") }}
                    </h4>

                    <p class="card-text text-muted">
                        {{ topic.summary }}
                    </p>

                </div>

                <div class="card-footer bg-transparent border-0">

                    <a href="/topic/{{ topic.name }}"
                       class="btn btn-primary w-100">

                        Read More
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
